services:
  build:
    build:
      context: .
      target: builder
    command: swift build --target AgentsBoardCore --target AgentsBoardServer
    volumes:
      - .:/app
      - build-cache:/app/.build

  test:
    build:
      context: .
      target: builder
    command: swift test --filter AgentsBoardCoreTests
    volumes:
      - .:/app
      - build-cache:/app/.build

  server:
    build: .
    ports:
      - "19850:19850"
    environment:
      - AGENTSBOARD_HOST=0.0.0.0
      - AGENTSBOARD_PORT=19850

volumes:
  build-cache:
