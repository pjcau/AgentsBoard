services:
  build:
    build:
      context: .
      dockerfile: Dockerfile.qt
      target: swift-builder
    command: swift build --target AgentsBoardCore
    volumes:
      - .:/app
      - build-cache:/app/.build

  test:
    build:
      context: .
      dockerfile: Dockerfile.qt
      target: swift-builder
    command: swift test --filter AgentsBoardCoreTests
    volumes:
      - .:/app
      - build-cache:/app/.build

volumes:
  build-cache:
