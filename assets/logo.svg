<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4338CA" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="80" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Inner glow -->
  <rect x="48" y="48" width="416" height="416" rx="72" fill="url(#glow)" opacity="0.3"/>
  <!-- Grid lines (mission control board) -->
  <line x1="170" y1="120" x2="170" y2="392" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="256" y1="120" x2="256" y2="392" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="342" y1="120" x2="342" y2="392" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="100" y1="200" x2="412" y2="200" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <line x1="100" y1="296" x2="412" y2="296" stroke="white" stroke-opacity="0.15" stroke-width="2"/>
  <!-- Agent node 1 (top-left) -->
  <circle cx="170" cy="160" r="28" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2.5"/>
  <circle cx="170" cy="160" r="10" fill="#34D399"/>
  <!-- Agent node 2 (top-right) -->
  <circle cx="342" cy="160" r="28" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2.5"/>
  <circle cx="342" cy="160" r="10" fill="#60A5FA"/>
  <!-- Agent node 3 (center) — main brain -->
  <circle cx="256" cy="248" r="40" fill="white" fill-opacity="0.2" stroke="white" stroke-width="3"/>
  <circle cx="256" cy="248" r="16" fill="white"/>
  <!-- Agent node 4 (bottom-left) -->
  <circle cx="170" cy="340" r="28" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2.5"/>
  <circle cx="170" cy="340" r="10" fill="#F472B6"/>
  <!-- Agent node 5 (bottom-right) -->
  <circle cx="342" cy="340" r="28" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2.5"/>
  <circle cx="342" cy="340" r="10" fill="#FBBF24"/>
  <!-- Connection lines -->
  <line x1="195" y1="172" x2="220" y2="232" stroke="white" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="317" y1="172" x2="292" y2="232" stroke="white" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="195" y1="328" x2="220" y2="264" stroke="white" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="317" y1="328" x2="292" y2="264" stroke="white" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- Pulse rings around center node -->
  <circle cx="256" cy="248" r="52" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <circle cx="256" cy="248" r="64" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
</svg>
