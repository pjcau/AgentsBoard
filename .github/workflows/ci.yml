name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # macOS — Full build (app + server + CLI + CoreFFI + tests)
  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Swift 6
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-macos-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-macos-

      - name: Build all targets
        run: swift build
      - name: Run tests
        run: swift test
      - name: Build .app bundle
        run: bash build.sh

  # Linux — Core + Server + CoreFFI (no UI)
  linux:
    runs-on: ubuntu-24.04
    container: swift:6.0-noble
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-linux-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-linux-

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y libsqlite3-dev wget build-essential
          wget -q "https://www.sqlite.org/2024/sqlite-autoconf-3460100.tar.gz"
          tar xf sqlite-autoconf-3460100.tar.gz
          cd sqlite-autoconf-3460100
          CFLAGS="-DSQLITE_ENABLE_SNAPSHOT -O2" \
            ./configure --prefix=/usr --libdir=/usr/lib/$(dpkg-architecture -qDEB_HOST_MULTIARCH) --disable-static
          make -j$(nproc) && make install
          cd .. && rm -rf sqlite-autoconf-* && ldconfig

      - name: Build Core + Server + CoreFFI
        run: swift build --target AgentsBoardCore --target AgentsBoardServer --target AgentsBoardCoreFFI
      - name: Run Core tests
        run: swift test --filter AgentsBoardCoreTests
