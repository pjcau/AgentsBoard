name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # macOS — Full build (app + server + CLI + CoreFFI + tests)
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build all targets
        run: swift build
      - name: Run tests
        run: swift test
      - name: Build .app bundle
        run: bash build.sh

  # Linux — Core + Server + CoreFFI (no UI)
  linux:
    runs-on: ubuntu-24.04
    container: swift:5.10-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: apt-get update && apt-get install -y libsqlite3-dev
      - name: Build Core + Server + CoreFFI
        run: swift build --target AgentsBoardCore --target AgentsBoardServer --target AgentsBoardCoreFFI
      - name: Run Core tests
        run: swift test --filter AgentsBoardCoreTests
